# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Tmux-first Telegram channel migration"
  slug: "tmux-channel-migration"
  kind: existing_plan
  tranche: "Validate the existing tmux migration plan, choose the first safe local work package, execute verified local progress, and continue until this tranche is audited."
  status: active
  intake:
    original_request: "Поставить goal тебе и сделать задачу через эту команду для qwwiwi-channel-telegram-Claude-code."
    interpreted_outcome: "Use GoalBuddy/native /goal to execute the existing tmux-first Telegram channel migration plan safely."
    input_shape: existing_plan
    audience: "qwwiwi / Orgrimmar Telegram agents operator"
    authority: requested
    proof_type: artifact
    completion_proof: "A verified GoalBuddy tranche with receipts, safe local artifacts or code changes, and an audit against docs/05-success-criteria.md and docs/06-tmux-migration-goal-plan.md."
    likely_misfire: "Treating the documentation plan as complete, or touching production tokens/launchd/gateway state before a safe bounded package and rollback are proven."
    blind_spots_considered:
      - "Native Codex /goal and GoalBuddy $goal-prep are separate features."
      - "Production work may require credentials, operator approval, and private repo access."
      - "The current public repository is mostly documentation; executable code may live in related local/private repositories."
      - "Anthropic billing classification cannot be proven from local code alone."
    existing_plan_facts:
      - "Primary path is launchd -> supervisor -> tmux -> claude --channels."
      - "Old gateway remains rollback until parity sign-off."
      - "Canary must use a separate test bot token before production tokens move."
      - "Per-agent cutover order starts with Silvana."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/tmux-channel-migration"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

